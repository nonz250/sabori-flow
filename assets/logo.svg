<svg xmlns="http://www.w3.org/2000/svg" width="480" height="100" viewBox="0 0 480 100">
  <style>
    .text-main { fill: #111827; }
    .dot-1 { fill: #6366F1; }
    .dot-2 { fill: #818CF8; }
    .dot-3 { fill: #A78BFA; }
    .ring-1 { fill: #6366F1; opacity: 0.15; }
    .ring-2 { fill: #818CF8; opacity: 0.15; }
    .ring-3 { fill: #A78BFA; opacity: 0.15; }
    .arrow-1 { fill: #6366F1; }
    .arrow-2 { fill: #818CF8; }
    .line-1 { stroke: #6366F1; }
    .line-2 { stroke: #818CF8; }
    @media (prefers-color-scheme: dark) {
      .text-main { fill: #F3F4F6; }
      .ring-1 { opacity: 0.25; }
      .ring-2 { opacity: 0.25; }
      .ring-3 { opacity: 0.25; }
    }
  </style>

  <!-- Flow icon: three nodes connected by arrows -->
  <g transform="translate(24, 50)">
    <!-- Node 1 -->
    <circle cx="0" cy="0" r="16" class="ring-1"/>
    <circle cx="0" cy="0" r="9" class="dot-1"/>

    <!-- Arrow 1 -->
    <line x1="16" y1="0" x2="34" y2="0" class="line-1" stroke-width="2"/>
    <polygon points="32,-4 40,0 32,4" class="arrow-1"/>

    <!-- Node 2 -->
    <circle cx="52" cy="0" r="16" class="ring-2"/>
    <circle cx="52" cy="0" r="9" class="dot-2"/>

    <!-- Arrow 2 -->
    <line x1="68" y1="0" x2="86" y2="0" class="line-2" stroke-width="2"/>
    <polygon points="84,-4 92,0 84,4" class="arrow-2"/>

    <!-- Node 3 -->
    <circle cx="104" cy="0" r="16" class="ring-3"/>
    <circle cx="104" cy="0" r="9" class="dot-3"/>
  </g>

  <!-- Text -->
  <text x="160" y="60" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="-0.5" class="text-main">sabori-flow</text>
</svg>
