<svg xmlns="http://www.w3.org/2000/svg" width="480" height="120" viewBox="0 0 480 120">
  <style>
    .text-main { fill: #111827; }
    .body { fill: #818CF8; }
    .body-shadow { fill: #6366F1; }
    .face { fill: #F3F4F6; }
    .eye-closed { stroke: #374151; stroke-width: 2; stroke-linecap: round; fill: none; }
    .mouth { stroke: #374151; stroke-width: 1.5; stroke-linecap: round; fill: none; }
    .cheek { fill: #FCA5A5; opacity: 0.5; }
    .zzz { fill: #A78BFA; font-family: system-ui, sans-serif; font-weight: 700; }
    .hat { fill: #6366F1; }
    .hat-band { fill: #4F46E5; }
    @media (prefers-color-scheme: dark) {
      .text-main { fill: #F3F4F6; }
      .face { fill: #E5E7EB; }
      .eye-closed { stroke: #1F2937; }
      .mouth { stroke: #1F2937; }
    }
  </style>

  <!-- Character: lazy blob mascot -->
  <g transform="translate(60, 58)">
    <!-- Body shadow (slightly offset) -->
    <ellipse cx="2" cy="22" rx="30" ry="10" fill="#6366F1" opacity="0.15"/>

    <!-- Body: round blob, slightly squished = lazy posture -->
    <ellipse cx="0" cy="0" rx="32" ry="26" class="body"/>
    <!-- Belly highlight -->
    <ellipse cx="-4" cy="2" rx="20" ry="16" class="face" opacity="0.25"/>

    <!-- Sleeping cap -->
    <path d="M -18,-20 Q -16,-22 -10,-24 Q 0,-28 10,-24 Q 18,-20 22,-14 L 30,-20 Q 26,-28 14,-32 Q 0,-36 -14,-30 Q -22,-26 -20,-20 Z" class="hat"/>
    <ellipse cx="30" cy="-20" rx="5" ry="5" fill="#A78BFA"/>
    <path d="M -18,-20 Q -16,-22 -10,-24 Q 0,-28 10,-24 Q 18,-20 22,-14" fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>

    <!-- Face -->
    <!-- Left eye: closed (sleeping) -->
    <path d="M -12,-4 Q -8,-8 -4,-4" class="eye-closed"/>
    <!-- Right eye: closed (sleeping) -->
    <path d="M 4,-4 Q 8,-8 12,-4" class="eye-closed"/>

    <!-- Mouth: relaxed smile -->
    <path d="M -5,5 Q 0,9 5,5" class="mouth"/>

    <!-- Cheeks -->
    <ellipse cx="-16" cy="4" rx="5" ry="3" class="cheek"/>
    <ellipse cx="16" cy="4" rx="5" ry="3" class="cheek"/>

    <!-- Zzz -->
    <text x="28" y="-20" class="zzz" font-size="11" opacity="0.6">z</text>
    <text x="36" y="-30" class="zzz" font-size="14" opacity="0.8">z</text>
    <text x="46" y="-38" class="zzz" font-size="17">Z</text>
  </g>

  <!-- Text -->
  <text x="120" y="68" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="-0.5" class="text-main">sabori-flow</text>
</svg>
